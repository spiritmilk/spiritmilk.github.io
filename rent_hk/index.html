    <h1>房屋租赁信息</h1>
    <div id="textContainer"></div>

    <div class="form-group">
      <label for="school">学校位置:（施工中）</label>
      <select id="school" name="school" class="form-control">
        <option value="">请选择</option>
        <option value="cuhk">港中大</option>
      </select>
    </div>

    <div class="form-group">
      <label for="rentmethod">整租/合租:</label>
      <select id="rentmethod" name="rentmethod" class="form-control">
        <option value="">请选择</option>
        <option value="sol">整租</option>
        <option value="nsol">合租</option>
      </select>
    </div>

    <div class="form-group">
      <label for="minRent">最低租金:</label>
      <input type="number" id="minRent" name="minRent" class="form-control">
    </div>
    
    <div class="form-group">
      <label for="maxRent">最高租金:</label>
      <input type="number" id="maxRent" name="maxRent" class="form-control">
    </div>

    <div class="form-group">
      <label for="sex">性别要求:</label>
      <select id="sex" name="sex" class="form-control">
        <option value="">请选择</option>
        <option value="female">女性</option>
        <option value="male">男性</option>
        <option value="all">男女皆可</option>
      </select>
    </div>
    
    <div class="form-group">
      <label for="time">时间要求:</label>
      <select id="time" name="time" class="form-control">

        <option value="1">一个月内</option>
        <option value="3">三个月内</option>
        <option value="6">半年内</option>
      </select>
    </div>

    <button onclick="filterHouses()" class="btn btn-primary">筛选</button>
    
    <div id="houseList"></div>
  </div>

  <script>
    fetch('1.txt')
        .then(response => response.text())
        .then(data => {
          // 获取文本容器元素
          const textContainer = document.getElementById('textContainer');
          
          // 将文本内容添加到文本容器中
          textContainer.innerHTML = data.replace(/\n/g, '<br>');
        })
        .catch(error => {
          console.error('读取文本文件时出错:', error);
        });

    function parseDateString(dateString) {
      var parts = dateString.match(/(\d+)-(\d+)-(\d+)/);
      if (parts) {
        return new Date(parts[1], parts[2] - 1, parts[3]);
      }
      return null;
    }
    function isWithinPeriod(dateStr, periodInMonths) {
        // 将字符串转换为Date对象
        const targetDate = parseDateString(dateStr);
        // 获取当前日期
        const currentDate = new Date();
        // 计算两个日期的时间差（毫秒）
        const timeDiff = targetDate - currentDate;
        // 计算时间差所代表的月数，这里我们用30天作为一个月的平均天数
        const monthDiff = timeDiff / (1000 * 60 * 60 * 24 * 30);
        // 检查是否在指定的月份范围内
        // 如果是正数或零，表示日期在当前时间之前或相同，我们需要确保它在指定的月份范围内
        return monthDiff >= -periodInMonths;
    }

    function filterHouses() {
     

      var minRent = document.getElementById("minRent").value;
      var maxRent = document.getElementById("maxRent").value;
      if (maxRent==""){
        maxRent=999999;
      }
      var sexTmp = document.getElementById("sex").value;
      var timeTmp = parseInt(document.getElementById("time").value);
      var schTmp = document.getElementById("school").value;
      var solTmp = document.getElementById("rentmethod").value;

      var houseList = document.getElementById("houseList");
      houseList.innerHTML = "";
      
      fetch('0519.csv')
        .then(response => response.text())
        .then(data => {
          var rows = data.split('\n');
          const linkContainer = document.getElementById('linkContainer');

          // 用户选择的筛选条件
          const sexFilters = {
            female: "女性",
            male: "男性",
            all: "男女皆可"
          };

          const solFilters = {
            sol: "整租",
            nsol: "合租",
          };
          const schFilters = {
            cuhk: "港中文",
          };

          rows.forEach(row => {
            var columns = row.split(',');
            var rent = parseInt(columns[6]);
            var sex_select = columns[2];
            var school_select = columns[9];
            var time_select = columns[8];
            var sol_select = columns[4]//.substring(0, 2);
            
            if ((!schTmp ? true : school_select== schFilters[schTmp])&& (!timeTmp ? true : isWithinPeriod(time_select,timeTmp))&& (!solTmp ? true : sol_select== solFilters[solTmp])&& (!sexTmp ? true : sex_select== sexFilters[sexTmp])&& rent >= minRent && rent <= maxRent) {
              console.log(time_select);
              console.log(timeTmp);
              console.log(Date());
              console.log(isWithinPeriod(time_select,timeTmp));
              var badge = document.createElement('div');
              badge.className = "house-info";
              
              const link = document.createElement('a');
              link.textContent = columns[0];
              link.href = columns[1];
              badge.appendChild(link);


              var rentBadge = document.createElement('span');
              rentBadge.className = "badge badge-primary";
              rentBadge.textContent = "出租方式: " + columns[4];
              badge.appendChild(rentBadge);
              
              var descBadge = document.createElement('span');
              descBadge.className = "badge badge-secondary";
              descBadge.textContent = "月租/港币: " + columns[6];
              badge.appendChild(descBadge);
              
              var urlBadge = document.createElement('span');
              urlBadge.className = "badge badge-info";
              urlBadge.textContent = "房屋类型: " + columns[3];
              badge.appendChild(urlBadge);
              

              var addrBadge = document.createElement('span');
              addrBadge.className = "badge badge-success";
              addrBadge.textContent = "地址: " + columns[5];
              badge.appendChild(addrBadge);

              var sexBadge = document.createElement('span');
              sexBadge.className = "badge badge-danger";
              sexBadge.textContent = "性别要求: " + columns[2];
              badge.appendChild(sexBadge);

              var typeBadge = document.createElement('span');
              typeBadge.className = "badge badge-light";
              typeBadge.textContent = "房源: " + columns[11];
              badge.appendChild(typeBadge);
              
              houseList.appendChild(badge);
            }
          });
        });
    }
  </script>
